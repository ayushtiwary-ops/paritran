# CI (SPEC section 11): tests, truth-rule spot-check, dependency audit, secret scan.
name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    # Throwaway per-run credentials for the ephemeral CI database on the
    # runner's localhost. Generated from workflow run context, never a
    # committed secret, discarded with the runner.
    env:
      CI_PG_ADMIN_PASSWORD: admin-ci-${{ github.run_id }}-${{ github.run_attempt }}
      CI_PG_APP_PASSWORD: app-ci-${{ github.run_id }}-${{ github.run_attempt }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: paritran_admin
          POSTGRES_DB: paritran
          POSTGRES_PASSWORD: admin-ci-${{ github.run_id }}-${{ github.run_attempt }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Run backend tests
        env:
          ADMIN_DATABASE_URL: postgresql://paritran_admin:${{ env.CI_PG_ADMIN_PASSWORD }}@localhost:5432/paritran
          DATABASE_URL: postgresql://paritran_app:${{ env.CI_PG_APP_PASSWORD }}@localhost:5432/paritran
          APP_DB_PASSWORD: ${{ env.CI_PG_APP_PASSWORD }}
          OFFICER1_PASSWORD: officer1-ci-${{ github.run_id }}-${{ github.run_attempt }}
          SUPERVISOR1_PASSWORD: supervisor1-ci-${{ github.run_id }}-${{ github.run_attempt }}
          AUDITOR1_PASSWORD: auditor1-ci-${{ github.run_id }}-${{ github.run_attempt }}
          RUN_MIGRATIONS_ON_STARTUP: "false"
        run: |
          cd backend
          python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

  truth-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Truth-rule spot-check (SPEC section 17 step 5, exit code is the verdict)
        run: |
          ! grep -rInE "0\.957|0\.966|0\.962|90\.8|52\.4|\b297\b|40 ?/ ?10|tamper_detected" frontend/src

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Audit the currently shipped dependency set without advisory
      # suppressions. Frozen historical measurements are provenance, not a
      # reason to ship a dependency version with a published fix available.
      - name: Audit backend dependencies
        run: |
          pip install pip-audit==2.10.1
          pip-audit -r backend/requirements.txt

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bandit (fail on high or above)
        run: |
          pip install bandit==1.9.4
          bandit -r backend/paritran --severity-level high

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The two --exclude-rule entries are triaged false positives
      # documented in docs/SECURITY.md section 6 (migration runner
      # executing repo-controlled SQL; Flask rule firing on slowapi's
      # internal limiter key). Everything else fails the job.
      - name: Semgrep (--config auto, any finding fails the job)
        run: |
          pip install semgrep==1.169.0
          semgrep scan --config auto --error \
            --exclude-rule python.sqlalchemy.security.sqlalchemy-execute-raw-query.sqlalchemy-execute-raw-query \
            --exclude-rule python.flask.security.audit.directly-returned-format-string.directly-returned-format-string \
            backend/paritran frontend/src src

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (exit 1 on CRITICAL)
        # 0.35.0 minimum: grype flags GHSA-69fq-xp46-6x23 on earlier tags.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"

# Grype has no CI job by design: it runs locally (and at the venue) via
# infra/scans/run_all.sh, which is the offline demo-day source of truth
# for the full scanner suite (SPEC section 11).
