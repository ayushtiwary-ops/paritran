# On-premise, zero-egress stack (SPEC section 2): the only configured outbound endpoint is host-local Ollama.
services:
  db:
    image: postgres:16-alpine
    environment:
      # paritran_admin owns the schema; the app connects as the low-privilege
      # paritran_app role created by the migration runner (SPEC section 4).
      POSTGRES_USER: paritran_admin
      POSTGRES_DB: paritran
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paritran_admin -d paritran"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - core

  api:
    build:
      context: ./backend
      dockerfile: ../infra/docker/Dockerfile.api
    # Least privilege: the api receives only the variables it consumes (SPEC section 4),
    # never the whole .env (which also holds the Grafana admin and role-seed credentials;
    # the role passwords move here when the Milestone 2 seeder needs them).
    environment:
      # Derived from the two db secrets so api and db can never disagree.
      DATABASE_URL: postgresql://paritran_app:${APP_DB_PASSWORD}@db:5432/paritran
      ADMIN_DATABASE_URL: postgresql://paritran_admin:${POSTGRES_PASSWORD}@db:5432/paritran
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      OFFICER1_PASSWORD: ${OFFICER1_PASSWORD}
      SUPERVISOR1_PASSWORD: ${SUPERVISOR1_PASSWORD}
      AUDITOR1_PASSWORD: ${AUDITOR1_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS}
      INLEGALBERT_PATH: ${INLEGALBERT_PATH}
      SEED: ${SEED}
      DEMO_MODE: ${DEMO_MODE}
      SOUND_DEFAULT: ${SOUND_DEFAULT}
      PARITRAN_RESULTS_JSON: /oracle/results.json
      PARITRAN_SAMPLES_DIR: /oracle/samples
    volumes:
      - ${INLEGALBERT_HOST_DIR}:/models/InLegalBERT:ro
      # Single-source-of-truth oracle and bundled samples for the in-container
      # test suite (SPEC 17 step 3); backend/ alone is the build context.
      - ./results.json:/oracle/results.json:ro
      - ./dataset/samples:/oracle/samples:ro
    networks:
      - core
      - edge
    ports:
      - "8090:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    networks:
      - edge
    ports:
      - "8081:80"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v3.4.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - core

  grafana:
    image: grafana/grafana:11.6.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - core
      - edge
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # Judge-verifiable slice: docker compose --profile slice up prototype
  prototype:
    build: .
    container_name: paritran_prototype
    command: python src/paritran_prototype.py
    profiles: ["slice"]

networks:
  core:
    internal: true
  edge:
    driver: bridge

volumes:
  pgdata:
