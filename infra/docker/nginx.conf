# Paritran web server config. Loaded as /etc/nginx/conf.d/default.conf inside
# the nginx:1.27-alpine image (see infra/docker/Dockerfile.web).
# Serves the built SPA and proxies /api/ and /health to the api service on the
# compose network (api:8000 in-container; published to the host as 8090).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (SPEC section 11). Declared once at server level and
    # inherited by every location below (none of them sets its own add_header,
    # which would otherwise drop these).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE passthrough for /api/stream/* (SPEC 9.2, wired in Milestone 4):
        # no response buffering, long read timeout.
        proxy_buffering off;
        proxy_read_timeout 3600s;
        # Multipart PDF/scan uploads to POST /api/intake/artefact (SPEC 9.1,
        # wired in Milestone 4) exceed nginx's 1 MB default body cap.
        client_max_body_size 25m;
    }

    location = /health {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: any non-file route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
