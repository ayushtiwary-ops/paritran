# Gitleaks config for filesystem scans of this repo (SPEC section 11).
#
# Extends the default ruleset. The allowlist below is documented in
# docs/SECURITY.md; every entry has a reason:
#
# - .env            The designated runtime secret store. Generated by
#                   scripts/bootstrap_env.sh, chmod 600, gitignored,
#                   never committed. It SHOULD contain secrets; flagging
#                   it on every scan would train people to ignore the
#                   scanner (alert fatigue), which is the real risk.
# - node_modules/   Third-party package fixtures and test keys; vendored
#                   dependency content is audited by npm audit and trivy,
#                   not secret-scanned.
# - frontend/dist/  Build output derived from sources that ARE scanned.
# - infra/scans/out/  Scanner reports themselves (a finding echoed in a
#                   report must not become a second finding).

title = "paritran gitleaks config"

[extend]
useDefault = true

[allowlist]
paths = [
    '''(^|/)\.env$''',
    '''node_modules/''',
    '''frontend/dist/''',
    '''infra/scans/out/''',
]
