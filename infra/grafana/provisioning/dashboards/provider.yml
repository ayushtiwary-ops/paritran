# Grafana dashboard provider (SPEC section 12). Loads JSON dashboards from this directory.
apiVersion: 1

providers:
  - name: paritran
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
